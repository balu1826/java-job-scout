name: 🎯 Daily Java Job Scout (FREE)

on:
  # 10:00 AM IST = 04:30 UTC
  schedule:
    - cron: "30 4 * * *"

  # Trigger manually anytime from GitHub UI
  workflow_dispatch:

jobs:
  job-scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install requests openpyxl

      - name: 🚀 Run Job Scout
        env:
          APIFY_API_TOKEN:    ${{ secrets.APIFY_API_TOKEN }}
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py

      # Bonus: Excel also visible directly on GitHub under Actions > Artifacts
      - name: 📎 Upload Excel as GitHub artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-jobs-report
          path: daily_jobs_*.xlsx
          retention-days: 7
